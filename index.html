<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Monitor</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="background-overlay"></div>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Signal Dashboard</p>
        <h1>Crypto Monitor</h1>
      </div>
      <div class="topbar-actions">
        <div id="lastUpdated" class="last-updated">Last updated: --</div>
        <button id="refreshBtn" class="refresh-btn" type="button">Refresh</button>
      </div>
    </header>

    <main class="dashboard">
      <section><div id="coinGrid" class="coin-grid"></div></section>

      <section class="detail-panel">
        <div class="detail-info">
          <div>
            <p class="section-label">Selected asset</p>
            <h2 id="selectedAssetName">Bitcoin</h2>
          </div>
          <div class="signal-pill" id="signalPill">Loading...</div>
        </div>

        <div class="insight-grid">
          <div class="insight-card"><div class="insight-label">Action Bias</div><div class="insight-value" id="actionBias">--</div></div>
          <div class="insight-card"><div class="insight-label">Buy Score</div><div class="insight-value" id="buyScore">--</div></div>
          <div class="insight-card"><div class="insight-label">Sell Score</div><div class="insight-value" id="sellScore">--</div></div>
          <div class="insight-card"><div class="insight-label">24h Change</div><div class="insight-value" id="change24h">--</div></div>
        </div>

        <div class="guidance-card">
          <div class="guidance-title">Current read</div>
          <p id="guidanceText">Loading market view…</p>
        </div>

        <div class="detail-top">
          <div>
            <p class="section-label">Price chart</p>
            <h2 id="chartTitle">BTC Chart</h2>
          </div>
          <div class="time-buttons">
            <button type="button" data-days="1">1D</button>
            <button type="button" data-days="7">7D</button>
            <button type="button" data-days="30" class="active">1M</button>
          </div>
        </div>

        <div class="chart-wrap">
          <div id="chartLoading" class="chart-loading hidden">Loading chart…</div>
          <canvas id="chart"></canvas>
        </div>

        <div class="metrics-grid">
          <div class="metric-box"><div class="metric-label">Current Price</div><div class="metric-value" id="metricPrice">--</div></div>
          <div class="metric-box"><div class="metric-label">Market Cap</div><div class="metric-value" id="metricMarketCap">--</div></div>
          <div class="metric-box"><div class="metric-label">24h Volume</div><div class="metric-value" id="metricVolume">--</div></div>
          <div class="metric-box"><div class="metric-label">Rank</div><div class="metric-value" id="metricRank">--</div></div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
