<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Monitor</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="background-overlay"></div>

  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Signal Dashboard</p>
        <h1>Crypto Monitor</h1>
      </div>

      <div class="topbar-actions">
        <div id="lastUpdated" class="last-updated">Last updated: --</div>
        <button id="refreshBtn" class="refresh-btn">Refresh</button>
      </div>
    </header>

    <main class="dashboard">
      <section>
        <div id="coinGrid" class="coin-grid"></div>
      </section>

      <section class="detail-panel">
        <div class="detail-top">
          <div>
            <p class="section-label">Selected asset</p>
            <h2 id="chartTitle">BTC Chart</h2>
          </div>

          <div class="time-buttons">
            <button data-days="1">1D</button>
            <button data-days="7">7D</button>
            <button data-days="30" class="active">1M</button>
          </div>
        </div>

        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
